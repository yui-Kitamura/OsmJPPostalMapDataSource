name: Scheduled Execution

on:
  schedule:
    - cron: '0 */6 * * *' # 6時間毎 (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:
    inputs:
      prefecture:
        description: '実行対象の都道府県コード（01〜47）または都道府県名'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn -B package
      - name: Run Main Method
        env:
          TARGET_PREFECTURE: ${{ inputs.prefecture }}
        run: mvn compile exec:java -Dexec.args="$TARGET_PREFECTURE"

      - name: Checkout gh-pages
        uses: actions/checkout@v7.0.0
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync generated files
        run: |
          mkdir -p gh-pages/pages
          rsync -av pages/ gh-pages/pages/

      - name: Commit and Push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "Update postal data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/pages
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    permissions:
      pages: write
      id-token: write 
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
