<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OsmJpPostalMapDataSource</title>
</head>
<body>
  <h1>OsmJpPostalMapDataSource</h1>
  <div id="status">Loading...</div>
  <pre id="data"></pre>
  
  <script>
      fetch('data.json')
          .then(response => response.json())
          .then(data => {
              document.getElementById('status').innerText = 'Last Updated: ' + data.lastUpdated;
              document.getElementById('data').innerText = JSON.stringify(data, null, 2);
          })
          .catch(error => {
              document.getElementById('status').innerText = 'Error loading data';
              console.error('Error:', error);
          });
  </script>
  
  <footer>
    <nav>
      <ul>
        <li><a href="https://github.com/yui-Kitamura/OsmJPPostalMapDataSource/tree/gh-pages/pages">GitHubSource</a></li>
      </ul>
    </nav>
  </footer>
</body>
</html>
